services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ..:/workspace:cached
        command: sleep infinity
        env_file:
            - .env
        environment:
            CAPHOUSE_DSN: "clickhouse://default:@clickhouse:9000/default"
        depends_on:
            clickhouse:
                condition: service_healthy

    caphouse-ui:
        image: node:lts
        volumes:
            - ..:/workspace:cached
        working_dir: /workspace/caphouse-ui
        command: sh -c "npm install && npm run dev"
        ports:
            - "8080:8080"

    clickhouse:
        image: clickhouse/clickhouse-server
        ports:
            - "8123:8123"
            - "9000:9000"
        environment:
            CLICKHOUSE_DB: default
            CLICKHOUSE_USER: default
            CLICKHOUSE_PASSWORD: ""
            CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        healthcheck:
            test: [ "CMD", "clickhouse-client", "--query", "SELECT 1" ]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        restart: unless-stopped
        ulimits:
            nofile:
                soft: 262144
                hard: 262144
