root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/caphouse-api ./cmd/caphouse-api"
  entrypoint = ["./tmp/caphouse-api", "--addr", "0.0.0.0:8081"]
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "caphouse-ui"]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "1s"

[log]
  time = false
  main_only = false

[color]
  build = "yellow"
  runner = "green"
  watcher = "cyan"
  app = ""

[misc]
  clean_on_exit = true
