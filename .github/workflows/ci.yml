name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  download-pcaps:
    name: Download test PCAPs
    runs-on: ubuntu-latest
    steps:
      - name: Download PCAPs from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          mkdir -p testdata
          aws s3 cp s3://caphouse/ testdata/ \
            --recursive \
            --endpoint-url https://hel1.your-objectstorage.com \
            --only-show-errors
      - uses: actions/upload-artifact@v4
        with:
          name: testdata-pcaps
          path: testdata/

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: download-pcaps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: testdata-pcaps
          path: testdata/
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: download-pcaps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: testdata-pcaps
          path: testdata/
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -tags integration -timeout 300s ./...
