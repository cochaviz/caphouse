name: Compression ratio

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  compression:
    name: Compression ratio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -tags compression -v -timeout 120s .
