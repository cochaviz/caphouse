name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  throughput:
    name: Throughput regression
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test -tags "throughput regression" -v -timeout 600s ./...

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: throughput-results
          path: benchmark_results/throughput_baseline.json
          if-no-files-found: warn

  compression:
    name: Compression regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test -tags "compression regression" -v -timeout 300s .

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compression-results
          path: |
            benchmark_results/compression_ratio_baseline.json
            test_results/compression_ratio.csv
            test_results/compression_by_table.csv
            test_results/parse_ratio.csv
          if-no-files-found: warn
