name: Docs

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r docs/requirements.txt
      - run: mkdocs gh-deploy --force --config-file docs/mkdocs.yml
